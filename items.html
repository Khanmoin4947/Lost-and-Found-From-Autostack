<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
     <section id="page-items" class="lf-page" aria-labelledby="items-title">
        <header class="lf-page-header">
          <h2 id="items-title">Items</h2>
          <p>Browse all reported lost and found items. Use search and filters to narrow results.</p>
        </header>

        <section class="lf-search-panel" aria-label="Search and filters">
          <div class="lf-search-row">
            <label class="lf-field">
              <span class="lf-field-label">Search</span>
              <input
                id="search-query"
                type="search"
                class="lf-input"
                placeholder="Search by title, category, description, or location"
              />
            </label>
          </div>
          <div class="lf-filter-row">
            <label class="lf-field">
              <span class="lf-field-label">Category</span>
              <select id="filter-category" class="lf-input">
                <option value="">All categories</option>
              </select>
            </label>
            <label class="lf-field">
              <span class="lf-field-label">Status</span>
              <select id="filter-status" class="lf-input">
                <option value="">Lost &amp; Found</option>
                <option value="lost">Lost</option>
                <option value="found">Found</option>
              </select>
            </label>
            <label class="lf-field">
              <span class="lf-field-label">From date</span>
              <input id="filter-from-date" type="date" class="lf-input" />
            </label>
            <label class="lf-field">
              <span class="lf-field-label">To date</span>
              <input id="filter-to-date" type="date" class="lf-input" />
            </label>
          </div>
        </section>

        <section aria-live="polite">
          <div id="items-empty" class="lf-empty-state" hidden>
            <p>No items match your search.</p>
            <button id="clear-search" class="lf-btn lf-btn-secondary">
              Clear search and filters
            </button>
          </div>

          <div id="items-grid" class="lf-items-grid" aria-label="Item results"></div>
        </section>

        <dialog id="item-detail" class="lf-dialog" aria-label="Item details">
          <button class="lf-dialog-close" type="button" data-close-dialog>&times;</button>
          <div class="lf-dialog-content" id="item-detail-content"></div>
        </dialog>
      </section>
      <script src="app.js"></script>
</body>
</html>
