<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Lost &amp; Found</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="lf-header">
      <div class="lf-container lf-header-inner">
        <div class="lf-logo">Lost &amp; Found</div>
        <nav class="lf-nav" aria-label="Main navigation">
          <button class="lf-nav-link is-active">Home</button>
          <button class="lf-nav-link">Items</button>
          <button class="lf-nav-link" data-route="report.html">Report</button>
          <button class="lf-nav-link" data-route="about.html">About Us</button>
        </nav>
      </div>
    </header>

    <main class="lf-main lf-container">
      <!-- Home -->
      <section id="page-home" class="lf-page is-visible" aria-labelledby="home-title">
        <div class="lf-hero">
          <div class="lf-hero-text">
            <h1 id="home-title">Lost &amp; Found</h1>
            <p class="lf-hero-subtitle">
              Report lost items, list found belongings, and browse all current reports in one simple, monochrome interface.
            </p>
            <div class="lf-hero-actions">
              <button class="lf-btn lf-btn-primary" data-route="report" data-report-type="lost">
                Report Lost Item
              </button>
              <button class="lf-btn lf-btn-secondary" data-route="report" data-report-type="found">
                Report Found Item
              </button>
            </div>
            <button class="lf-link-button" data-route="items">
              Browse all items
            </button>
          </div>
        </div>
      </section>
      <script src="app.js"></script>
  </body>
  </html>
