<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report an Item</title>
    <link rel="stylesheet" href="styles.css" />
</head>
<body>
    <!-- Report -->
      <section id="page-report" class="lf-page" aria-labelledby="report-title">
        <header class="lf-page-header">
          <h2 id="report-title">Report an Item</h2>
          <p>Choose whether you are reporting a lost item or an item you have found.</p>
        </header>

        <div class="lf-toggle-group" role="tablist" aria-label="Report type">
          <button
            id="tab-lost"
            class="lf-toggle is-active"
            role="tab"
            aria-selected="true"
            data-report-type="lost"
          >
            Report a Lost Item
          </button>
          <button
            id="tab-found"
            class="lf-toggle"
            role="tab"
            aria-selected="false"
            data-report-type="found"
          >
            Report a Found Item
          </button>
        </div>

        <form id="report-form" novalidate class="lf-form" aria-label="Report item form">
          <input type="hidden" id="report-status" value="lost" />

          <div class="lf-form-grid">
            <label class="lf-field">
              <span class="lf-field-label">Title<span aria-hidden="true">*</span></span>
              <input id="field-title" type="text" class="lf-input" required />
              <span class="lf-error" id="error-title"></span>
            </label>

            <label class="lf-field">
              <span class="lf-field-label">Category<span aria-hidden="true">*</span></span>
              <select id="field-category" class="lf-input" required>
                <option value="">Select a category</option>
                <option value="Electronics">Electronics</option>
                <option value="Clothing">Clothing</option>
                <option value="Accessories">Accessories</option>
                <option value="Documents">Documents</option>
                <option value="Keys">Keys</option>
                <option value="Others">Others</option>
              </select>
              <span class="lf-error" id="error-category"></span>
            </label>
          </div>

          <label class="lf-field">
            <span class="lf-field-label">Description<span aria-hidden="true">*</span></span>
            <textarea id="field-description" class="lf-input" rows="4" required></textarea>
            <span class="lf-error" id="error-description"></span>
          </label>

          <div class="lf-form-grid">
            <label class="lf-field">
              <span class="lf-field-label">
                Date <span id="label-date-kind">lost</span><span aria-hidden="true">*</span>
              </span>
              <input id="field-date" type="date" class="lf-input" required />
              <span class="lf-error" id="error-date"></span>
            </label>

            <label class="lf-field">
              <span class="lf-field-label">
                Location <span id="label-location-kind">lost</span><span aria-hidden="true">*</span>
              </span>
              <input id="field-location" type="text" class="lf-input" required />
              <span class="lf-error" id="error-location"></span>
            </label>
          </div>

          <div class="lf-form-grid">
            <label class="lf-field">
              <span class="lf-field-label">Contact name<span aria-hidden="true">*</span></span>
              <input id="field-contact-name" type="text" class="lf-input" required />
              <span class="lf-error" id="error-contact-name"></span>
            </label>

            <label class="lf-field">
              <span class="lf-field-label">Contact email</span>
              <input id="field-contact-email" type="email" class="lf-input" />
              <span class="lf-error" id="error-contact-email"></span>
            </label>
          </div>

          <label class="lf-field">
            <span class="lf-field-label">Contact phone</span>
            <input id="field-contact-phone" type="tel" class="lf-input" />
            <span class="lf-error" id="error-contact-phone"></span>
          </label>

          <label class="lf-field">
            <span class="lf-field-label">Image URL (optional)</span>
            <input
              id="field-image-url"
              type="url"
              class="lf-input"
              placeholder="Link to a black &amp; white or desaturated image"
            />
            <span class="lf-error" id="error-image-url"></span>
          </label>

          <p class="lf-note">
            Fields marked with <span aria-hidden="true">*</span> are required.
          </p>

          <div class="lf-form-actions">
            <button type="submit" class="lf-btn lf-btn-primary">
              Submit report
            </button>
          </div>

          <div id="report-success" class="lf-success" hidden>
            <p>Your report has been submitted.</p>
            <button type="button" class="lf-btn lf-btn-secondary" data-route="items">
              View item in list
            </button>
          </div>
        </form>
      </section>
<script src="app.js"></script>
</body>
</html>
